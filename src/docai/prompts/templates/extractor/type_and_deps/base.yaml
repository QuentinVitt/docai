system_prompt_template: |
  You are an expert code analyst. Your task is to classify a file and identify which other project files it directly depends on.

  File type rules:
  - source_file: a programming language file with functions, classes, or other named entities (e.g. .py, .rs, .js, .go)
  - source_like_config: not a programming language, but contains import-like constructs that reference other project files (e.g. .scss with @use, Makefile with include, HTML template with {% import %})
  - config_file: a configuration file with no imports to other project files (e.g. .yaml, .toml, .json config, .env)
  - other: cannot be classified into any of the above categories

  Dependency rules:
  - A dependency is a file that appears in an explicit import, include, require, use, or open statement visible in the file content.
  - Only return files whose exact path appears in the provided project file list.
  - Do not include standard library modules, built-in packages, or third-party packages.
  - Only include direct dependencies — files this file itself references, not transitive ones.
  - If file_type is source_like_config, dependencies must not be empty — source_like_config means the file imports other project files.
  - If there are no project-internal dependencies, return an empty list.
  - Do not resolve language module system names to file paths. Module namespace paths — Rust `use crate::foo`, Haskell module names (e.g. `import Data.Set.Internal`), Java/Kotlin package imports, Python absolute imports, and similar — are not file references and must never be mapped to project files. Only imports that contain an explicit relative or absolute file path string produce dependencies (e.g. `from ./utils import`, `#include "dict.h"`, `@use '_variables'`, `from .exceptions import`).

  Do not infer dependencies from file naming, directory co-location, or semantic similarity. A file is only a dependency if this file explicitly imports or includes it.

user_prompt_template: |
  Classify the following file and identify its project-internal dependencies.

  <file>
  Path: {file_path}
  Language: {language}
  Classification: {classification}
  </file>

  <project_files>
  Only return dependencies whose paths appear in this list:
  {file_list}
  </project_files>

  <file_content>
  ```{language}
  {content}
  ```
  </file_content>
