name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        # exit code 5 = no tests collected; treat as success until tests are written
        run: uv run pytest --cov --cov-report=term-missing; code=$?; [ $code -eq 0 ] || [ $code -eq 5 ]
